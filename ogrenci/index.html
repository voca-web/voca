<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voca Öğrenci Girişi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .lock-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #6d28d9;
            transform: translateY(-2px);
        }

        .error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="lock-card">
        <div class="icon">🔒</div>
        <h2 style="margin:0; color:#111827;">Öğrenci Portalı</h2>
        <p style="color:#6b7280; font-size: 14px;">Lütfen size verilen giriş şifresini girin.</p>

        <input type="password" id="studentPass" placeholder="Şifre" onkeypress="if(event.key === 'Enter') login()">
        <button onclick="login()">Giriş Yap</button>
        <p id="errorMsg" class="error">Üzgünüm, şifre hatalı!</p>
    </div>

    <script>
        function login() {
            const pass = document.getElementById('studentPass').value.trim();
            if (!pass) return;

            // This is the trick: We try to go to the folder named EXACTLY like the password.
            // If the folder doesn't exist, the user gets a 404 (handled by Cloudflare).
            window.location.href = `./${pass}/index.html`;
        }
    </script>

</body>

</html>
